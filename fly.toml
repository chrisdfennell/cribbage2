# fly.toml app configuration file generated for cribbage on 2026-05-28T11:15:33-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cribbage'
primary_region = 'iad'

[build]

[env]
  PORT = '3000'
  # Bind the Next.js standalone server to all interfaces inside the container.
  # Fly auto-sets HOSTNAME to the machine name, which would bind to the wrong
  # address and make the app unreachable through fly-proxy.
  HOSTNAME = '0.0.0.0'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
