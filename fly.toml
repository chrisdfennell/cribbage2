# Fly.io config — `fly launch` will rename `app` if needed.
#
# IMPORTANT: This app keeps room state in memory on a single instance, so we
# pin to one machine and disable auto-scaling. If multiple machines ran, room
# codes created on one would not be visible on another.

app = "cribbage"
primary_region = "iad"   # change to your closest region: sjc, ord, lhr, fra, syd, ...

[build]

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Long-lived SSE: extend idle timeouts.
  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
